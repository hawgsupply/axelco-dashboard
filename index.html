<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axel Co — Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --pink:   #FF6B9D;
    --purple: #B06AFF;
    --cyan:   #00D4FF;
    --green:  #00FF88;
    --orange: #FF9F43;
    --bg:     #08080F;
    --bg2:    #0E0E1A;
    --bg3:    #141422;
    --border: #1E1E35;
    --border2:#28284A;
    --text:   #D0C8E8;
    --muted:  #4A4070;
    --mono:   'Share Tech Mono', monospace;
    --head:   'Rajdhani', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--head);
    min-height: 100vh;
    background-image:
      linear-gradient(rgba(176,106,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(176,106,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .shell { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

  /* HEADER */
  .header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header::after {
    content: ''; position: absolute; bottom: -1px; left: 0;
    width: 120px; height: 2px;
    background: linear-gradient(90deg, var(--pink), transparent);
  }
  .brand-name {
    font-family: var(--head); font-weight: 700; font-size: 32px;
    letter-spacing: 4px; color: #fff; text-transform: uppercase; line-height: 1;
  }
  .brand-name span { color: var(--pink); }
  .brand-sub { font-family: var(--mono); font-size: 11px; color: var(--purple); letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }
  .header-right { text-align: right; }
  .date-display { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 1px; }
  .header-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }

  /* BUTTONS */
  .btn { font-family: var(--head); font-weight: 600; font-size: 12px; padding: 7px 16px; border-radius: 2px; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }
  .btn-primary { background: var(--pink); color: #000; box-shadow: 0 0 12px rgba(255,107,157,0.3); }
  .btn-primary:hover { background: #ff8fb8; box-shadow: 0 0 20px rgba(255,107,157,0.5); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { border-color: var(--pink); color: var(--pink); }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
  .stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; position: relative; overflow: hidden; }
  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.s-done::before   { background: var(--green);  box-shadow: 0 0 8px var(--green); }
  .stat-card.s-prog::before   { background: var(--pink);   box-shadow: 0 0 8px var(--pink); }
  .stat-card.s-ord::before    { background: var(--purple); box-shadow: 0 0 8px var(--purple); }
  .stat-card.s-recv::before   { background: var(--cyan);   box-shadow: 0 0 8px var(--cyan); }
  .stat-num { font-family: var(--mono); font-size: 36px; line-height: 1; }
  .s-done .stat-num  { color: var(--green);  text-shadow: 0 0 12px rgba(0,255,136,0.4); }
  .s-prog .stat-num  { color: var(--pink);   text-shadow: 0 0 12px rgba(255,107,157,0.4); }
  .s-ord  .stat-num  { color: var(--purple); text-shadow: 0 0 12px rgba(176,106,255,0.4); }
  .s-recv .stat-num  { color: var(--cyan);   text-shadow: 0 0 12px rgba(0,212,255,0.4); }
  .stat-lbl { font-family: var(--head); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-top: 4px; }

  .progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 32px; display: flex; overflow: hidden; }
  .pseg { height: 4px; transition: width 0.5s ease; }
  .pseg-done { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .pseg-prog { background: var(--pink);   box-shadow: 0 0 6px var(--pink); }
  .pseg-ord  { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
  .pseg-ns   { background: var(--border2); }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); position: relative; }
  .section-head::before { content: ''; position: absolute; bottom: -1px; left: 0; width: 60px; height: 1px; background: var(--pink); box-shadow: 0 0 6px var(--pink); }
  .section-label { font-family: var(--head); font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: #fff; display: flex; align-items: center; gap: 10px; }
  .sec-count { font-family: var(--mono); font-size: 11px; background: var(--bg3); border: 1px solid var(--border2); color: var(--pink); padding: 2px 8px; border-radius: 2px; }

  /* TASK CARDS */
  .task-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--muted); border-radius: 2px; padding: 12px 14px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 14px; transition: all 0.2s; }
  .task-card:hover { border-color: var(--border2); }
  .task-card.done         { opacity: 0.35; border-left-color: var(--green); }
  .task-card.in-progress  { border-left-color: var(--pink);   box-shadow: -2px 0 8px rgba(255,107,157,0.15); }
  .task-card.ordered      { border-left-color: var(--purple); box-shadow: -2px 0 8px rgba(176,106,255,0.15); }
  .task-card.received     { border-left-color: var(--cyan);   box-shadow: -2px 0 8px rgba(0,212,255,0.15); }
  .task-card.not-started  { border-left-color: var(--border2); }
  .task-left { flex: 1; }
  .task-title { font-family: var(--head); font-size: 14px; font-weight: 500; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
  .task-card.done .task-title { text-decoration: line-through; color: var(--muted); }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .day-badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .day-Mon { background: rgba(106,163,255,0.12); color: #6AA3FF; border: 1px solid rgba(106,163,255,0.25); }
  .day-Tue { background: rgba(176,106,255,0.12); color: #B06AFF; border: 1px solid rgba(176,106,255,0.25); }
  .day-Wed { background: rgba(255,107,157,0.12); color: #FF6B9D; border: 1px solid rgba(255,107,157,0.25); }
  .day-Thu { background: rgba(106,255,170,0.12); color: #6AFFAA; border: 1px solid rgba(106,255,170,0.25); }
  .day-Fri { background: rgba(255,204,68,0.12);  color: #FFCC44; border: 1px solid rgba(255,204,68,0.25); }
  .day-Sat { background: rgba(68,255,238,0.12);  color: #44FFEE; border: 1px solid rgba(68,255,238,0.25); }
  .day-Sun { background: rgba(255,170,68,0.12);  color: #FFAA44; border: 1px solid rgba(255,170,68,0.25); }
  .task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
  .task-actions { display: flex; gap: 4px; align-items: center; }
  .day-select { background: var(--bg3); border: 1px solid var(--border2); color: var(--muted); font-family: var(--mono); font-size: 11px; padding: 4px 8px; border-radius: 2px; cursor: pointer; }
  .day-select:focus { outline: none; border-color: var(--pink); }
  .icon-btn { background: none; border: 1px solid var(--border); cursor: pointer; font-size: 13px; padding: 3px 7px; border-radius: 2px; color: var(--muted); transition: all 0.15s; }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .icon-btn.delete:hover { border-color: #FF3355; color: #FF3355; }
  .status-group { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
  .status-btn { font-family: var(--head); font-size: 10px; font-weight: 600; padding: 3px 9px; border-radius: 2px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 1px; }
  .status-btn:hover { border-color: var(--border2); color: var(--text); }
  .status-btn.active-not-started { border-color: var(--border2); color: var(--text); background: var(--bg3); }
  .status-btn.active-in-progress { border-color: var(--pink);   color: var(--pink);   background: rgba(255,107,157,0.1); box-shadow: 0 0 6px rgba(255,107,157,0.2); }
  .status-btn.active-ordered     { border-color: var(--purple); color: var(--purple); background: rgba(176,106,255,0.1); box-shadow: 0 0 6px rgba(176,106,255,0.2); }
  .status-btn.active-received    { border-color: var(--cyan);   color: var(--cyan);   background: rgba(0,212,255,0.1);   box-shadow: 0 0 6px rgba(0,212,255,0.2); }
  .status-btn.active-done        { border-color: var(--green);  color: var(--green);  background: rgba(0,255,136,0.1);   box-shadow: 0 0 6px rgba(0,255,136,0.2); }

  /* INVENTORY CARDS */
  .inv-card { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--purple); border-radius: 2px; padding: 14px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
  .inv-card.status-ordered  { border-left-color: var(--purple); }
  .inv-card.status-shipped  { border-left-color: var(--orange); }
  .inv-card.status-received { border-left-color: var(--green);  }
  .inv-name { font-family: var(--head); font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .inv-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; margin-top: 6px; }
  .inv-meta strong { color: var(--text); }
  .inv-status-btns { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
  .inv-sbtn { font-family: var(--head); font-weight: 600; font-size: 10px; padding: 4px 12px; border-radius: 2px; cursor: pointer; border: 1px solid; text-transform: uppercase; letter-spacing: 1px; transition: all 0.15s; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-top: 2px solid var(--pink); border-radius: 4px; padding: 28px; width: 480px; max-width: 95vw; box-shadow: 0 0 40px rgba(255,107,157,0.15); }
  .modal h2 { font-family: var(--head); font-weight: 700; font-size: 16px; text-transform: uppercase; letter-spacing: 2px; color: var(--pink); margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 7px; }
  .form-group textarea, .form-group select, .form-group input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); color: var(--text); border-radius: 2px; padding: 9px 12px; font-size: 13px; font-family: var(--head); resize: vertical; transition: border-color 0.15s; }
  .form-group textarea { min-height: 60px; }
  .form-group select, .form-group input { height: 38px; resize: none; }
  .form-group textarea:focus, .form-group select:focus, .form-group input:focus { outline: none; border-color: var(--pink); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  @media(max-width:600px){ .stats-row{grid-template-columns:repeat(2,1fr);} .task-card{flex-direction:column;} .task-right{align-items:flex-start;} }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div>
      <div class="brand-name">AXEL <span>CO</span></div>
      <div class="brand-sub">// OPERATIONS CENTER ✨</div>
    </div>
    <div class="header-right">
      <div class="date-display" id="dateDisplay"></div>
      <div class="header-actions">
        <button class="btn btn-ghost" onclick="exportData()">↓ EXPORT</button>
        <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">↑ IMPORT</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card s-done"><div class="stat-num" id="stat-done">0</div><div class="stat-lbl">Completed</div></div>
    <div class="stat-card s-prog"><div class="stat-num" id="stat-prog">0</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat-card s-ord"><div class="stat-num" id="stat-ord">0</div><div class="stat-lbl">Ordered</div></div>
    <div class="stat-card s-recv"><div class="stat-num" id="stat-recv">0</div><div class="stat-lbl">Received</div></div>
  </div>
  <div class="progress-wrap" id="progressBar"></div>

  <!-- TASKS -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">✦ Tasks <span class="sec-count" id="tasks-count">0</span></div>
      <button class="btn btn-primary" onclick="openTaskModal()">+ ADD TASK</button>
    </div>
    <div id="tasks-list"></div>
  </div>

  <!-- INVENTORY ORDERED -->
  <div class="section">
    <div class="section-head">
      <div class="section-label">◈ Inventory Ordered <span class="sec-count" id="inv-count">0</span></div>
      <button class="btn btn-primary" onclick="openInvModal()">+ ADD ITEM</button>
    </div>
    <div id="inv-list"></div>
  </div>

</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModalOverlay">
  <div class="modal">
    <h2 id="taskModalTitle">Add Task</h2>
    <div class="form-group"><label>Description</label><textarea id="taskTitle" placeholder="What needs to get done?"></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Day</label><select id="taskDay"><option>Mon</option><option>Tue</option><option>Wed</option><option>Thu</option><option>Fri</option><option>Sat</option><option>Sun</option></select></div>
      <div class="form-group"><label>Status</label><select id="taskStatus"><option>Not Started</option><option>In Progress</option><option>Ordered</option><option>Done</option></select></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTaskModal()">CANCEL</button>
      <button class="btn btn-primary" onclick="saveTask()">SAVE</button>
    </div>
  </div>
</div>

<!-- INVENTORY MODAL -->
<div class="modal-overlay" id="invModalOverlay">
  <div class="modal">
    <h2>Add Inventory Item</h2>
    <div class="form-group"><label>Item Name</label><input type="text" id="invName" placeholder="e.g. Leather Jackets - Size M"></div>
    <div class="form-row">
      <div class="form-group"><label>Quantity</label><input type="text" id="invQty" placeholder="e.g. 24 units"></div>
      <div class="form-group"><label>Status</label><select id="invStatus"><option>Ordered</option><option>Shipped</option><option>Received</option></select></div>
    </div>
    <div class="form-group"><label>Supplier</label><input type="text" id="invSupplier" placeholder="e.g. Vendor name"></div>
    <div class="form-row">
      <div class="form-group"><label>Cost</label><input type="text" id="invCost" placeholder="e.g. $420.00"></div>
      <div class="form-group"><label>ETA</label><input type="text" id="invEta" placeholder="e.g. Apr 15"></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="invNotes" placeholder="Any notes..."></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeInvModal()">CANCEL</button>
      <button class="btn btn-primary" onclick="saveInv()">SAVE</button>
    </div>
  </div>
</div>

<script>
const DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const TASK_STATUSES = ['Not Started','In Progress','Ordered','Done'];
const INV_STATUSES  = ['Ordered','Shipped','Received'];
const INV_COLORS    = { 'Ordered': '#B06AFF', 'Shipped': '#FF9F43', 'Received': '#00FF88' };

const TASKS_KEY = 'axelco_tasks';
const INV_KEY   = 'axelco_inventory';

// ── Tasks ─────────────────────────────────────────────────────────────────────
function loadTasks() { try { return JSON.parse(localStorage.getItem(TASKS_KEY) || '[]'); } catch { return []; } }
function saveTasks(t) { localStorage.setItem(TASKS_KEY, JSON.stringify(t)); }
function genId() { return 'id-' + Date.now() + '-' + Math.random().toString(36).substr(2,5); }
function statusKey(s) { return s.toLowerCase().replace(/\s+/g,'-'); }

let taskModalMode = 'add';
let taskEditId = '';

function openTaskModal() {
  taskModalMode = 'add';
  document.getElementById('taskModalTitle').textContent = 'Add Task';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDay').value = 'Mon';
  document.getElementById('taskStatus').value = 'Not Started';
  document.getElementById('taskModalOverlay').classList.add('open');
}
function openEditTask(id) {
  const task = loadTasks().find(t => t.id === id);
  if (!task) return;
  taskModalMode = 'edit';
  taskEditId = id;
  document.getElementById('taskModalTitle').textContent = 'Edit Task';
  document.getElementById('taskTitle').value = task.title;
  document.getElementById('taskDay').value = task.day;
  document.getElementById('taskStatus').value = task.status;
  document.getElementById('taskModalOverlay').classList.add('open');
}
function closeTaskModal() { document.getElementById('taskModalOverlay').classList.remove('open'); }
function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) return;
  const tasks = loadTasks();
  if (taskModalMode === 'add') {
    tasks.push({ id: genId(), title, day: document.getElementById('taskDay').value, status: document.getElementById('taskStatus').value });
  } else {
    const t = tasks.find(t => t.id === taskEditId);
    if (t) { t.title = title; t.day = document.getElementById('taskDay').value; t.status = document.getElementById('taskStatus').value; }
  }
  saveTasks(tasks); closeTaskModal(); renderAll();
}
function changeTaskStatus(id, status) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (t) { t.status = status; saveTasks(tasks); renderAll(); }
}
function changeTaskDay(id, day) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (t) { t.day = day; saveTasks(tasks); renderAll(); }
}
function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  saveTasks(loadTasks().filter(t => t.id !== id)); renderAll();
}

function renderTasks() {
  const tasks = loadTasks();
  const container = document.getElementById('tasks-list');
  document.getElementById('tasks-count').textContent = tasks.length;
  container.innerHTML = '';
  tasks.forEach(task => {
    const sk = statusKey(task.status);
    const div = document.createElement('div');
    div.className = `task-card ${sk}`;
    div.innerHTML = `
      <div class="task-left">
        <div class="task-title">${task.title}</div>
        <div class="task-meta"><span class="day-badge day-${task.day}">${task.day}</span></div>
      </div>
      <div class="task-right">
        <div class="task-actions">
          <select class="day-select" onchange="changeTaskDay('${task.id}',this.value)">
            ${DAYS.map(d=>`<option value="${d}"${d===task.day?' selected':''}>${d}</option>`).join('')}
          </select>
          <button class="icon-btn" onclick="openEditTask('${task.id}')">✏</button>
          <button class="icon-btn delete" onclick="deleteTask('${task.id}')">✕</button>
        </div>
        <div class="status-group">
          ${TASK_STATUSES.map(s=>`<button class="status-btn${statusKey(s)===sk?' active-'+statusKey(s):''}" onclick="changeTaskStatus('${task.id}','${s}')">${s}</button>`).join('')}
        </div>
      </div>`;
    container.appendChild(div);
  });
}

// ── Inventory ─────────────────────────────────────────────────────────────────
function loadInv() { try { return JSON.parse(localStorage.getItem(INV_KEY) || '[]'); } catch { return []; } }
function saveInv_(i) { localStorage.setItem(INV_KEY, JSON.stringify(i)); }

function openInvModal() { document.getElementById('invModalOverlay').classList.add('open'); }
function closeInvModal() {
  document.getElementById('invModalOverlay').classList.remove('open');
  ['invName','invQty','invSupplier','invCost','invEta','invNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('invStatus').value = 'Ordered';
}
function saveInv() {
  const name = document.getElementById('invName').value.trim();
  if (!name) return;
  const inv = loadInv();
  inv.push({
    id: genId(), name,
    qty:      document.getElementById('invQty').value.trim(),
    status:   document.getElementById('invStatus').value,
    supplier: document.getElementById('invSupplier').value.trim(),
    cost:     document.getElementById('invCost').value.trim(),
    eta:      document.getElementById('invEta').value.trim(),
    notes:    document.getElementById('invNotes').value.trim(),
    date:     new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
  });
  saveInv_(inv); closeInvModal(); renderAll();
}
function setInvStatus(id, status) {
  const inv = loadInv();
  const item = inv.find(i => i.id === id);
  if (item) { item.status = status; saveInv_(inv); renderAll(); }
}
function deleteInv(id) {
  if (!confirm('Remove this item?')) return;
  saveInv_(loadInv().filter(i => i.id !== id)); renderAll();
}

function renderInv() {
  const inv = loadInv();
  const container = document.getElementById('inv-list');
  document.getElementById('inv-count').textContent = inv.length;
  container.innerHTML = '';
  if (!inv.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:12px 0">No inventory items yet. Click + ADD ITEM to get started ✨</div>';
    return;
  }
  inv.forEach(item => {
    const color = INV_COLORS[item.status] || '#555';
    const div = document.createElement('div');
    div.className = `inv-card status-${item.status.toLowerCase()}`;
    div.innerHTML = `
      <div style="flex:1">
        <div class="inv-name">${item.name}</div>
        <div class="inv-meta">
          ${item.qty ? `<span>QTY: <strong>${item.qty}</strong></span>` : ''}
          ${item.supplier ? `<span>FROM: <strong>${item.supplier}</strong></span>` : ''}
          ${item.cost ? `<span>COST: <strong style="color:var(--pink)">${item.cost}</strong></span>` : ''}
          ${item.eta ? `<span>ETA: <strong style="color:var(--cyan)">${item.eta}</strong></span>` : ''}
          ${item.date ? `<span>ADDED: <strong>${item.date}</strong></span>` : ''}
          ${item.notes ? `<span style="color:var(--muted);font-style:italic">${item.notes}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        <button class="icon-btn delete" onclick="deleteInv('${item.id}')">✕</button>
        <div class="inv-status-btns">
          ${INV_STATUSES.map(s => {
            const c = INV_COLORS[s];
            const active = item.status === s;
            return `<button class="inv-sbtn" onclick="setInvStatus('${item.id}','${s}')"
              style="border-color:${c};color:${active?'#000':c};background:${active?c:c+'18'}">${s}</button>`;
          }).join('')}
        </div>
      </div>`;
    container.appendChild(div);
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const tasks = loadTasks();
  const inv   = loadInv();
  const done  = tasks.filter(t=>t.status==='Done').length;
  const prog  = tasks.filter(t=>t.status==='In Progress').length;
  const ord   = tasks.filter(t=>t.status==='Ordered').length + inv.filter(i=>i.status==='Ordered').length;
  const recv  = inv.filter(i=>i.status==='Received').length;
  const total = (tasks.length + inv.length) || 1;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-prog').textContent = prog;
  document.getElementById('stat-ord').textContent  = ord;
  document.getElementById('stat-recv').textContent = recv;
  document.getElementById('progressBar').innerHTML = `
    <div class="pseg pseg-done" style="width:${done/total*100}%"></div>
    <div class="pseg pseg-prog" style="width:${prog/total*100}%"></div>
    <div class="pseg pseg-ord"  style="width:${ord/total*100}%"></div>
    <div class="pseg pseg-ns"   style="width:${(total-done-prog-ord-recv)/total*100}%"></div>
  `;
}

function renderAll() { renderTasks(); renderInv(); updateStats(); }

// ── Import/Export ─────────────────────────────────────────────────────────────
function exportData() {
  const data = { tasks: loadTasks(), inventory: loadInv() };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'axelco-dashboard-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.tasks)     saveTasks(data.tasks);
      if (data.inventory) saveInv_(data.inventory);
      renderAll();
    } catch { alert('Invalid file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// Close modals on overlay click
document.getElementById('taskModalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeTaskModal(); });
document.getElementById('invModalOverlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeInvModal(); });

document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
renderAll();
</script>
